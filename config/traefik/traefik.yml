# NEXUS-AIKALABS — Traefik Static Configuration
# Reverse proxy with automatic SSL via Let's Encrypt

api:
  dashboard: true
  insecure: true  # Dashboard on :8080 (only accessible via Tailscale)

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Uncomment when domain is configured:
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: "${ACME_EMAIL}"
#       storage: "/letsencrypt/acme.json"
#       httpChallenge:
#         entryPoint: web

log:
  level: "WARN"
