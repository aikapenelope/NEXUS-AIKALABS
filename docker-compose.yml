# =============================================================================
# NEXUS-AIKALABS — Docker Compose (Production)
# =============================================================================
# El Cerebro Corporativo: Unified enterprise workspace
#
# Services:
#   postgres   — PostgreSQL 16 + pgvector (shared, isolated databases)
#   redis      — Redis 7 (Directus cache, queues)
#   directus   — Headless CMS + REST/GraphQL API + MCP Server
#   agno       — AgentOS (FastAPI + AI agents)
#   frontend   — Next.js + CopilotKit (AG-UI)
#   n8n        — Workflow automation (deterministic integrations)
#   prefect    — Workflow orchestration (scraping, ETL, embeddings)
#   traefik    — Reverse proxy + SSL
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DATA LAYER
  # ---------------------------------------------------------------------------

  postgres:
    image: agnohq/pgvector:16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c work_mem=16MB
      -c maintenance_work_mem=512MB
      -c max_connections=200
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost (access via Tailscale)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    networks:
      - nexus-internal

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # PLANO DE DATOS Y CONTROL — Directus
  # ---------------------------------------------------------------------------

  directus:
    image: directus/directus:11.5.0
    container_name: nexus-directus
    restart: unless-stopped
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"

      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}

      # MCP Server (native, for Agno agent integration)
      MCP_ENABLED: "true"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    ports:
      - "127.0.0.1:8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8055/server/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - nexus-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.directus.rule=PathPrefix(`/directus`)"
      - "traefik.http.services.directus.loadbalancer.server.port=8055"

  # ---------------------------------------------------------------------------
  # PLANO COGNITIVO — Agno AgentOS
  # ---------------------------------------------------------------------------

  agno:
    build:
      context: ./services/agno
      dockerfile: Dockerfile
    container_name: nexus-agno
    restart: unless-stopped
    environment:
      # Database
      AGNO_DB_URL: ${AGNO_DB_URL}
      AGNO_VECTOR_DB_URL: ${AGNO_VECTOR_DB_URL}

      # LLM Keys
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Embeddings
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}

      # Directus (MCP + REST fallback)
      DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}

      # WhatsApp (optional)
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}

      # Redis (for future use)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      # Docker socket for DinD sandbox tool
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agno-sandboxes:/opt/sandboxes
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - nexus-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agno.rule=PathPrefix(`/api/agno`)"
      - "traefik.http.services.agno.loadbalancer.server.port=8000"

  # ---------------------------------------------------------------------------
  # PLANO DE EXPERIENCIA — Frontend (Next.js + CopilotKit)
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AGNO_URL: ${AGNO_PUBLIC_URL:-http://localhost:8000}
      NEXT_PUBLIC_DIRECTUS_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      agno:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - nexus-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # INTEGRACIONES DETERMINISTAS — n8n
  # ---------------------------------------------------------------------------

  n8n:
    image: n8nio/n8n:1.91.3
    container_name: nexus-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_POSTGRESDB_DATABASE:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: America/Bogota
      # Performance: disable task runners to avoid known memory leaks
      N8N_RUNNERS_ENABLED: "false"
      # Prune old executions to save memory
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"  # 7 days
      # Community nodes (for Directus integration)
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=PathPrefix(`/n8n`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  # ---------------------------------------------------------------------------
  # PLANO DE TRABAJADORES — Prefect Server
  # ---------------------------------------------------------------------------

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: nexus-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: ${PREFECT_API_DATABASE_CONNECTION_URL}
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_API_PORT: "4200"
    ports:
      - "127.0.0.1:4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4200/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal

  # Prefect worker (runs the actual flows: scraping, ETL, embeddings)
  prefect-worker:
    build:
      context: ./services/workers
      dockerfile: Dockerfile
    container_name: nexus-prefect-worker
    restart: unless-stopped
    command: prefect worker start --pool default-pool --type process
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
      AGNO_VECTOR_DB_URL: ${AGNO_VECTOR_DB_URL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    depends_on:
      prefect:
        condition: service_healthy
      directus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # REVERSE PROXY — Traefik
  # ---------------------------------------------------------------------------

  traefik:
    image: traefik:v3.3
    container_name: nexus-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"  # Dashboard (Tailscale only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nexus-internal

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres-data:
  redis-data:
  directus-uploads:
  directus-extensions:
  n8n-data:
  agno-sandboxes:
  traefik-certs:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  nexus-internal:
    driver: bridge
