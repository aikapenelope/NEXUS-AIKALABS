# =============================================================================
# NEXUS-AIKALABS — Docker Compose (Production)
# =============================================================================
# El Cerebro Corporativo: Unified enterprise workspace
#
# 12 services, 2 internet-facing routes (frontend + WhatsApp webhook).
# All other dashboards accessible via Tailscale only.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DATA LAYER
  # ---------------------------------------------------------------------------

  postgres:
    image: agnohq/pgvector:16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c work_mem=16MB
      -c maintenance_work_mem=512MB
      -c max_connections=200
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    networks:
      - nexus-internal

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # RERANKER — Infinity (local, no API key)
  # ---------------------------------------------------------------------------

  reranker:
    image: michaelf34/infinity:0.0.76
    container_name: nexus-reranker
    restart: unless-stopped
    command: v2 --model-id BAAI/bge-reranker-base --port 7997
    ports:
      - "127.0.0.1:7997:7997"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7997/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # OBJECT STORAGE — RustFS (S3-compatible)
  # ---------------------------------------------------------------------------

  rustfs:
    image: rustfs/rustfs:latest
    container_name: nexus-rustfs
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER:-nexus}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-nexus-secret-key}
    volumes:
      - rustfs-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # PLANO DE DATOS Y CONTROL — Directus
  # ---------------------------------------------------------------------------

  directus:
    image: directus/directus:11.5.0
    container_name: nexus-directus
    restart: unless-stopped
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Cache (Redis-backed, auto-purge on data changes)
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      CACHE_AUTO_PURGE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      # Security
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: redis
      RATE_LIMITER_POINTS: "50"
      RATE_LIMITER_DURATION: "1"
      PRESSURE_LIMITER_ENABLED: "true"

      # Logging (warn in production, reduce noise)
      LOG_LEVEL: "warn"

      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"

      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}

      # MCP Server (for Agno agent integration)
      MCP_ENABLED: "true"

      # Object storage (RustFS / S3-compatible)
      STORAGE_LOCATIONS: "s3"
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: ${RUSTFS_ROOT_USER:-nexus}
      STORAGE_S3_SECRET: ${RUSTFS_ROOT_PASSWORD:-nexus-secret-key}
      STORAGE_S3_BUCKET: "directus"
      STORAGE_S3_ENDPOINT: "http://rustfs:9000"
      STORAGE_S3_REGION: "us-east-1"
      STORAGE_S3_FORCE_PATH_STYLE: "true"
    volumes:
      - directus-extensions:/directus/extensions
    ports:
      - "127.0.0.1:8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8055/server/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - nexus-internal
    # NOT exposed to internet — access via Tailscale only

  # ---------------------------------------------------------------------------
  # PLANO COGNITIVO — Agno AgentOS
  # ---------------------------------------------------------------------------

  agno:
    build:
      context: ./services/agno
      dockerfile: Dockerfile
    container_name: nexus-agno
    restart: unless-stopped
    environment:
      # Database (agno_user: full CRUD on agno_memory, read-only on app/public)
      AGNO_DB_URL: "postgresql+psycopg://agno_user:agno_password@postgres:5432/${POSTGRES_DB:-directus}"
      AGNO_VECTOR_DB_URL: "postgresql+psycopg://agno_user:agno_password@postgres:5432/${POSTGRES_DB:-directus}"

      # LLM Keys
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Embeddings
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}

      # Reranker (local Infinity server)
      RERANKER_HOST: reranker
      RERANKER_PORT: "7997"

      # Prefect (for triggering flows from agents)
      PREFECT_API_URL: http://prefect:4200/api

      # Directus (MCP + REST)
      DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}

      # WhatsApp (optional)
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agno-sandboxes:/opt/sandboxes
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_healthy
      reranker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - nexus-internal
    labels:
      # Only WhatsApp webhook exposed to internet (Meta requires HTTPS)
      - "traefik.enable=true"
      - "traefik.http.routers.whatsapp-webhook.rule=Path(`/whatsapp/webhook`)"
      - "traefik.http.routers.whatsapp-webhook.entrypoints=websecure"
      - "traefik.http.services.whatsapp-webhook.loadbalancer.server.port=8000"

  # ---------------------------------------------------------------------------
  # PLANO DE EXPERIENCIA — Frontend (Next.js + CopilotKit)
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AGNO_URL: ${AGNO_PUBLIC_URL:-http://localhost:8000}
      NEXT_PUBLIC_DIRECTUS_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      agno:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - nexus-internal
    labels:
      # Frontend is the ONLY service fully exposed to internet
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.priority=1"

  # ---------------------------------------------------------------------------
  # INTEGRACIONES DETERMINISTAS — n8n
  # ---------------------------------------------------------------------------

  n8n:
    image: n8nio/n8n:1.91.3
    container_name: nexus-n8n
    restart: unless-stopped
    environment:
      # Database (schema isolation)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-directus}
      DB_POSTGRESDB_SCHEMA: n8n
      DB_POSTGRESDB_USER: n8n_user
      DB_POSTGRESDB_PASSWORD: n8n_password

      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: America/Bogota

      # Memory leak prevention (critical for production stability)
      N8N_RUNNERS_ENABLED: "false"
      N8N_DEFAULT_BINARY_DATA_MODE: "filesystem"
      N8N_CONCURRENCY_PRODUCTION_LIMIT: "5"

      # Execution pruning (prevent DB bloat)
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"

      # Community nodes (for Directus integration)
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal
    # NOT exposed to internet — access via Tailscale only

  # ---------------------------------------------------------------------------
  # PLANO DE TRABAJADORES — Prefect Server
  # ---------------------------------------------------------------------------

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: nexus-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect_user:prefect_password@postgres:5432/${POSTGRES_DB:-directus}"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_API_PORT: "4200"
    ports:
      - "127.0.0.1:4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4200/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal

  prefect-worker:
    build:
      context: ./services/workers
      dockerfile: Dockerfile
    container_name: nexus-prefect-worker
    restart: unless-stopped
    command: prefect worker start --pool default-pool --type process --with-healthcheck
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      PREFECT_WORKER_WEBSERVER_HOST: "0.0.0.0"
      PREFECT_WORKER_WEBSERVER_PORT: "8080"
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
      AGNO_VECTOR_DB_URL: "postgresql+psycopg://agno_user:agno_password@postgres:5432/${POSTGRES_DB:-directus}"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    depends_on:
      prefect:
        condition: service_healthy
      directus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - nexus-internal

  # ---------------------------------------------------------------------------
  # MONITORING — Uptime Kuma
  # ---------------------------------------------------------------------------

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: nexus-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - nexus-internal
    # NOT exposed to internet — access via Tailscale only

  # ---------------------------------------------------------------------------
  # REVERSE PROXY — Traefik
  # ---------------------------------------------------------------------------

  traefik:
    image: traefik:v3.3
    container_name: nexus-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nexus-internal

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres-data:
  redis-data:
  rustfs-data:
  directus-extensions:
  n8n-data:
  agno-sandboxes:
  uptime-kuma-data:
  traefik-certs:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  nexus-internal:
    driver: bridge
